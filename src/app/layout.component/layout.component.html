<main class="h-screen w-screen grid grid-rows-[84px_auto] overflow-hidden">
    <app-header-component></app-header-component>
    <div class="w-screen h-full grid grid-rows-[84px_auto] p-4">
        <app-navbar-component></app-navbar-component>
        <div class="h-full grid grid-cols-[auto_35%] gap-4 p-2">
            <app-map-component></app-map-component>
            <div class="box-shadow rounded-xl overflow-y-scroll h-150">
              @if(mapService.processing()) {
                <app-status></app-status>
              } @else {
                <router-outlet></router-outlet>
              }
            </div>
        </div>
    </div>
</main>
