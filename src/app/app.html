<main class="h-screen w-screen grid grid-cols-[minmax(250px,30%)_auto]">
  <aside class="min-w-62.5 w-full" ngClass={{asideClass()}}>
    <div class="p-1 flex flex-col items-center gap-4 cursor-pointer" ngClass={{navbarClass()}}>
      <div class="avatar avatar-placeholder" routerLink="/profile">
        <div class="bg-neutral text-neutral-content w-8 rounded-full border">
          <span class="text-xs">UI</span>
        </div>
      </div>
      <ul class="flex flex-col gap-4 items-center">
        @for (icon of icons; track icon.id) {
          <li>
          <button routerLink={{icon.path}} class="tooltip cursor-pointer tooltip-right">
             <img src={{icon.iconPath}} width="20px" height="20px" alt="profile image"/>
          </button>
        </li>
        }
         
      </ul>
    </div>
    <div class="w-full">
      <router-outlet></router-outlet>
    </div>
  </aside>
  <section class="border border-green-700 w-full h-full">
    <app-map-component></app-map-component>
  </section>
</main>
